<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Waste Management System</title>

<style>
body{
    margin:0;
    font-family:Verdana;
    background:#0f172a;
    color:#e2e8f0;
}

header{
    background:#1f2937;
    text-align:center;
    padding:18px;
    font-size:24px;
    font-weight:bold;
    color:#60a5fa;
}

.wrapper{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.box{
    background:#111827;
    margin:12px;
    padding:18px;
    width:250px;
    border-radius:14px;
    box-shadow:0 0 12px rgba(0,0,0,0.6);
}

.progress-area{
    background:#374151;
    height:14px;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
}

.fill{
    height:100%;
    width:0%;
    transition:0.7s ease-in-out;
}

.status-text{
    margin-top:10px;
    font-size:17px;
}

.controls{
    text-align:center;
    margin:15px;
}

button{
    padding:10px 14px;
    margin:6px;
    border:none;
    border-radius:8px;
    font-weight:bold;
    cursor:pointer;
}

.green{background:#22c55e;}
.orange{background:#f59e0b;}
.red{background:#ef4444;}

.info{
    text-align:center;
    color:#38bdf8;
    font-size:18px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>♻️ SMART WASTE MONITORING DASHBOARD</header>

<div class="info">
Eco Score: <span id="score">0</span> |
Status Prediction: <span id="statusMsg">Loading...</span>
</div>

<div class="controls">
<button class="green" onclick="generateWaste('wet')">Wet Waste</button>
<button class="orange" onclick="generateWaste('dry')">Dry Waste</button>
<button class="red" onclick="generateWaste('plastic')">Plastic Waste</button>
</div>

<div class="wrapper">

<div class="box">
<h3>Container A</h3>
<div class="progress-area"><div class="fill" id="binA"></div></div>
<div class="status-text" id="textA">Empty</div>
</div>

<div class="box">
<h3>Container B</h3>
<div class="progress-area"><div class="fill" id="binB"></div></div>
<div class="status-text" id="textB">Empty</div>
</div>

<div class="box">
<h3>Container C</h3>
<div class="progress-area"><div class="fill" id="binC"></div></div>
<div class="status-text" id="textC">Empty</div>
</div>

<div class="box">
<h3>AI Scanner</h3>
<div id="aiView">Idle...</div>
</div>

<div class="box">
<h3>Route Optimizer</h3>
<div id="routeView">Analyzing...</div>
</div>

</div>

<script>

let capacity = {
    binA: 0,
    binB: 0,
    binC: 0
};

let ecoScore = 0;
let logData = [];

function generateWaste(category){

    let selected = pickRandomBin();
    let value = 10 + Math.random()*20;

    capacity[selected] += value;
    if(capacity[selected] > 100) capacity[selected] = 100;

    logData.push(capacity[selected]);

    renderUI(selected, category);
    updateScore(category);
    analyzeTrend();
    optimizeRoute();
}

function pickRandomBin(){
    let list = Object.keys(capacity);
    return list[Math.floor(Math.random()*list.length)];
}

function renderUI(bin, category){

    document.getElementById(bin).style.width = capacity[bin] + "%";

    let condition = "Empty";
    if(capacity[bin] > 70) condition = "FULL 🔴";
    else if(capacity[bin] > 40) condition = "MID 🟡";
    else condition = "LOW 🟢";

    document.getElementById("text"+bin.charAt(3)).innerText = condition;

    document.getElementById("aiView").innerText =
        "AI detected " + category.toUpperCase() + " waste successfully processed";
}

function updateScore(category){
    if(category === "dry") ecoScore += 10;
    else if(category === "plastic") ecoScore += 7;
    else if(category === "wet") ecoScore += 5;

    document.getElementById("score").innerText = ecoScore;
}

function analyzeTrend(){

    if(logData.length < 3) return;

    let diff = logData[logData.length-1] - logData[logData.length-3];

    if(diff > 25){
        document.getElementById("statusMsg").innerText = "Risk of Overflow ⚠️";
    }else{
        document.getElementById("statusMsg").innerText = "System Stable ✔";
    }
}

function optimizeRoute(){

    let best = Object.keys(capacity).reduce((x,y)=>
        capacity[x] < capacity[y] ? x : y
    );

    document.getElementById("routeView").innerText =
        "Suggested Pickup Bin: " + best.toUpperCase();
}

</script>

</body>
</html>
